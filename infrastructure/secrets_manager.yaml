AWSTemplateFormatVersion: 2010-09-09
Description: Secrets Manager secrets for the event-driven data platform

Resources:
  RedshiftAdminSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: data-platform-redshift-credentials
      Description: Redshift admin credentials for the data platform
      GenerateSecretString:
        SecretStringTemplate: !Sub
          - '{"username": "victorcezeh", "port": 5439, "database": "data_platform_db", "host": "${Host}"}'
          - Host: !ImportValue data-platform-redshift-endpoint
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\'

Outputs:
  RedshiftSecretArn:
    Description: Redshift Admin Secret ARN
    Value: !Ref RedshiftAdminSecret
    Export:
      Name: data-platform-redshift-secret-arn